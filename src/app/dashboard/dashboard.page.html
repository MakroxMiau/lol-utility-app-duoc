<ion-header>
  <ion-toolbar color="primary">
    <ion-title>LoL Utility Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="bienvenida">
    <h2>¡Bienvenido, Invocador!</h2>
    <p>Selecciona una herramienta para optimizar tu partida en la Grieta.</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6">
        <ion-card routerLink="/wave-manager" button="true" class="menu-card">
          <ion-card-header>
            <ion-card-title>Calculadora de Oleadas</ion-card-title>
            <ion-card-subtitle>Control de Macrogame y Freeze</ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>

      <ion-col size="12" size-md="6">
        <ion-card routerLink="/tempos" button="true" class="menu-card">
          <ion-card-header>
            <ion-card-title>Tracker de Tempos</ion-card-title>
            <ion-card-subtitle>Contador de Spells y Objetivos</ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>

      <ion-col size="12">
        <ion-card routerLink="/perfil" button="true" class="menu-card perfil-card">
          <ion-card-header>
            <ion-card-title>Mi Perfil de Invocador</ion-card-title>
            <ion-card-subtitle>Configuración de Preferencias</ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
