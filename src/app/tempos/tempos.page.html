<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Tracker de Tempos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p>Registra los hechizos de invocador del equipo enemigo para coordinar gankeos perfectos.</p>

  <ion-list>
    <ion-item>
      <ion-label>
        <h2>Midlaner Enemigo</h2>
        <p>Hechizo: Destello (Flash)</p>
      </ion-label>
      
      <div slot="end" *ngIf="flashEnemigoMid > 0" class="cooldown-timer">
        {{ flashEnemigoMid }}s
      </div>
      
      <ion-button slot="end" (click)="iniciarFlashMid()" [disabled]="flashEnemigoMid > 0">
        Gastar Flash
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
